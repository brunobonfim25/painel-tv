<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0a0f;color:#ededf5;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.code{font-size:80px;font-weight:800;color:#e94560;letter-spacing:-4px;line-height:1}
.title{font-size:22px;font-weight:700;margin:16px 0 8px}
.desc{font-size:14px;color:#7a7a95;margin-bottom:32px}
a{display:inline-flex;align-items:center;gap:8px;background:#e94560;color:#fff;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:600;text-decoration:none;transition:background .2s}
a:hover{background:#ff5a75}
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1 class="title">Página não encontrada</h1>
    <p class="desc">O endereço que você acessou não existe ou foi removido.</p>
    <a href="javascript:history.back()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
      Voltar
    </a>
  </div>
</body>
</html>
