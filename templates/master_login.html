<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master — PainelPro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#0d0d16;
  --border:rgba(255,255,255,0.08);
  --acc:#e94560;--acc-h:#ff5a75;
  --t1:#ededf5;--t2:#7a7a95;--t3:#44445a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;padding:20px}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;border-radius:50%;background:radial-gradient(ellipse,rgba(233,69,96,0.07),transparent 65%);pointer-events:none;z-index:0}
.wrap{width:100%;max-width:380px;position:relative;z-index:1}
.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.brand-icon{width:40px;height:40px;background:var(--acc);border-radius:10px;display:flex;align-items:center;justify-content:center}
.brand-name{font-size:20px;font-weight:800;letter-spacing:-0.03em;color:var(--t1)}
.brand-name em{color:var(--acc);font-style:normal}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px}
.master-badge{
  width:64px;height:64px;border-radius:14px;
  background:rgba(233,69,96,0.12);border:1px solid rgba(233,69,96,0.2);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
}
.card-title{font-size:20px;font-weight:800;letter-spacing:-0.03em;color:var(--t1);text-align:center}
.card-sub{font-size:13px;color:var(--t2);margin-top:4px;margin-bottom:28px;text-align:center}
.field-label{display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--t2);margin-bottom:7px}
.field-input{
  width:100%;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;font-size:14px;font-family:inherit;
  color:var(--t1);outline:none;transition:all .2s;
}
.field-input::placeholder{color:var(--t3)}
.field-input:focus{border-color:var(--acc);background:rgba(233,69,96,0.04);box-shadow:0 0 0 3px rgba(233,69,96,0.08)}
.field-group{margin-bottom:20px}
.btn-primary{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--acc);border:none;border-radius:10px;
  color:#fff;cursor:pointer;font-family:inherit;
  font-size:14px;font-weight:700;padding:13px;
  transition:all .2s;
}
.btn-primary:hover{background:var(--acc-h);transform:translateY(-1px)}
.erro{
  display:flex;align-items:center;gap:8px;
  background:rgba(233,69,96,0.08);border:1px solid rgba(233,69,96,0.2);
  border-radius:10px;padding:12px 14px;
  font-size:13px;color:var(--acc);margin-bottom:20px;
}
.restricted{
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:11px;color:var(--t3);margin-top:20px;
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
    </div>
    <span class="brand-name">Painel<em>Pro</em></span>
  </div>
  <div class="card">
    <div class="master-badge">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div class="card-title">Master Dashboard</div>
    <div class="card-sub">Acesso restrito — apenas administradores</div>
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}{% for m in msgs %}
        <div class="erro">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
          {{ m }}
        </div>
      {% endfor %}{% endif %}
    {% endwith %}
    <form method="POST">
      <div class="field-group">
        <label class="field-label">Senha master</label>
        <input class="field-input" type="password" name="senha" placeholder="Digite a senha master" autofocus required>
      </div>
      <button type="submit" class="btn-primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
        Acessar dashboard
      </button>
    </form>
    <div class="restricted">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Acesso restrito e monitorado
    </div>
  </div>
</div>
</body>
</html>
