<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Master Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#0f0f1a;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .box{background:#1a1a2e;border-radius:12px;padding:40px 36px;width:100%;max-width:360px;border:1px solid #2a2a4e}
  .logo{width:64px;height:64px;border-radius:50%;background:#e94560;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px;font-weight:900;color:#fff}
  h2{text-align:center;font-size:18px;color:#fff;margin-bottom:6px}
  .sub{text-align:center;font-size:13px;color:#666;margin-bottom:24px}
  label{font-size:12px;color:#aaa;display:block;margin-bottom:4px;font-weight:600}
  input[type=password]{width:100%;padding:10px 12px;border:1px solid #2a2a4e;border-radius:6px;font-size:14px;margin-bottom:16px;background:#0f0f1a;color:#fff}
  button{width:100%;padding:11px;background:#e94560;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer}
  button:hover{background:#c73652}
  .erro{background:#3d1a1a;border:1px solid #e94560;border-radius:6px;padding:10px 12px;font-size:13px;color:#e94560;margin-bottom:16px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">M</div>
  <h2>Master Dashboard</h2>
  <div class="sub">Acesso restrito — apenas administradores</div>
  {% with msgs = get_flashed_messages() %}
    {% if msgs %}{% for m in msgs %}<div class="erro">{{ m }}</div>{% endfor %}{% endif %}
  {% endwith %}
  <form method="POST">
    <label>Senha master</label>
    <input type="password" name="senha" placeholder="Digite a senha master" autofocus required>
    <button type="submit">Entrar</button>
  </form>
</div>
</body>
</html>
