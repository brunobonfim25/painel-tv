<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>{{ academia.nome }}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--primary:{{ academia.cor_primaria }};--accent:{{ academia.cor_destaque }};--tag:{{ academia.cor_tag }}}
  body{font-family:Arial,sans-serif;background:#111;height:100vh;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden}
  .tv{background:#fff;width:100%;max-width:1600px;height:calc(100vh - 24px);border-radius:10px;overflow:hidden;display:grid;grid-template-columns:1fr 180px}
  .main{display:flex;flex-direction:column;padding:16px 16px 12px;overflow:hidden}
  .header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:10px;border-bottom:3px solid var(--accent);flex-shrink:0}
  .logo-circle{width:50px;height:50px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
  .logo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .logo-text{color:#fff;font-weight:900;font-size:18px;font-style:italic}
  .academy-name{font-size:24px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--primary)}
  .academy-name span{color:var(--accent)}
  .academy-sub{font-size:12px;color:#888;margin-top:1px}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .page-info{font-size:12px;color:#aaa;font-weight:600;white-space:nowrap}
  .progress-bar{width:100px;height:4px;background:#eee;border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .1s linear}
  .grid-wrap{flex:1;overflow:hidden}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;height:100%;align-content:start}
  .card{background:#f8f8f8;border-radius:8px;padding:8px 6px;text-align:center;border:1px solid #eee;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:border-color .2s}
  .card:hover{border-color:var(--accent)}
  .avatar{width:70px;height:70px;border-radius:50%;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;border:3px solid #ddd;overflow:hidden;flex-shrink:0}
  .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .cargo{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:2px}
  .nome{font-size:11px;font-weight:800;color:#111;margin-bottom:3px;line-height:1.2}
  .info{font-size:8px;color:#555;line-height:1.6;text-align:left;width:100%}
  .lbl{color:#aaa;font-size:7px;display:block;margin-top:2px}
  .tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;justify-content:center}
  .tag{font-size:7px;padding:2px 4px;border-radius:3px;font-weight:700;color:#fff;background:var(--tag)}
  .qr-mini{margin-top:5px}
  .qr-mini canvas{border-radius:4px}
  .wa-label{font-size:7px;color:#25d366;font-weight:700;margin-top:2px}
  .side{border-left:1px solid #e0e0e0;background:#f5f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 10px;gap:12px}
  .side-circle{width:60px;height:60px;border-radius:50%;border:3px solid var(--primary);background:var(--primary);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .side-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .side-circle span{color:#fff;font-weight:900;font-size:16px;font-style:italic}
  .cta{font-size:15px;font-weight:800;text-align:center;line-height:1.3;color:#111}
  .qr-box{background:#fff;padding:8px;border-radius:6px;border:1px solid #ddd}
  .qr-row{display:flex;align-items:center;gap:5px}
  .book{font-size:8px;font-weight:800;letter-spacing:3px;color:#888;text-transform:uppercase;writing-mode:vertical-rl}
  .total-badge{background:var(--primary);color:#fff;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;text-align:center}
</style>
</head>
<body>
<div class="tv">
  <div class="main">
    <div class="header">
      <div class="logo-circle">
        {% if academia.logo_url %}<img src="{{ academia.logo_url }}" alt="Logo">
        {% else %}<span class="logo-text">{{ academia.logo_texto or academia.nome[:2] }}</span>{% endif %}
      </div>
      <div>
        <div class="academy-name">{{ academia.nome }} <span>Trainers</span></div>
        <div class="academy-sub">{{ academia.subtitulo }}</div>
      </div>
      <div class="header-right">
        <span class="page-info" id="pageInfo"></span>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>
  </div>
  <div class="side">
    <div class="side-circle">
      {% if academia.logo_url %}<img src="{{ academia.logo_url }}" alt="Logo">
      {% else %}<span>{{ academia.logo_texto or academia.nome[:2] }}</span>{% endif %}
    </div>
    <div class="cta">{{ academia.cta_texto }}</div>
    <div class="qr-row">
      <span class="book">Agende</span>
      <div class="qr-box" id="qr"></div>
      <span class="book">Agende</span>
    </div>
    <div class="total-badge" id="totalBadge"></div>
  </div>
</div>

<script>
const PROFISSIONAIS = {{ profissionais | tojson }};
const COLS = 6, ROWS = 3, PER_PAGE = COLS * ROWS, INTERVAL_MS = 12000;
let currentPage = 0, progress = 0, progressTimer = null;
const totalPages = Math.max(1, Math.ceil(PROFISSIONAIS.length / PER_PAGE));

function iniciais(nome) {
  return nome.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
}

function limpaNumero(n) {
  return (n||"").replace(/\D/g,"");
}

function renderPage(page) {
  const grid = document.getElementById("grid");
  const slice = PROFISSIONAIS.slice(page * PER_PAGE, page * PER_PAGE + PER_PAGE);

  grid.innerHTML = slice.map(p => {
    const tags = (p.especialidades||"").split(",").filter(e=>e.trim())
      .map(e=>`<span class="tag">${e.trim()}</span>`).join("");
    const avatarInner = p.foto_url
      ? `<img src="${p.foto_url}" alt="${p.nome}">`
      : iniciais(p.nome);
    const hasWA = p.whatsapp && limpaNumero(p.whatsapp).length >= 10;
    const waQR = hasWA
      ? `<div class="qr-mini" id="qr-${p.id}"></div><div class="wa-label">WhatsApp</div>`
      : "";
    return `<div class="card">
      <div class="avatar" style="background:${p.cor_avatar}">${avatarInner}</div>
      <div class="cargo">${p.cargo||""}</div>
      <div class="nome">${p.nome}</div>
      <div class="info">
        <span class="lbl">Instagram</span><span>${p.instagram||""}</span>
        <span class="lbl">Experiencia</span><span>${p.anos||""} anos</span>
      </div>
      <div class="tags">${tags}</div>
      ${waQR}
    </div>`;
  }).join("");

  slice.forEach(p => {
    if (p.whatsapp && limpaNumero(p.whatsapp).length >= 10) {
      const num = limpaNumero(p.whatsapp);
      const msg = encodeURIComponent(`Ola ${p.nome}! Vi seu perfil na academia e gostaria de saber mais sobre seus servicos.`);
      const waUrl = `https://wa.me/${num}?text=${msg}`;
      const el = document.getElementById(`qr-${p.id}`);
      if (el) {
        new QRCode(el, {
          text: waUrl,
          width: 52, height: 52,
          colorDark: "#25d366",
          colorLight: "#ffffff"
        });
      }
    }
  });

  document.getElementById("pageInfo").textContent =
    totalPages > 1 ? `${page+1} / ${totalPages}` : "";
  document.getElementById("totalBadge").textContent =
    `${PROFISSIONAIS.length} profissional${PROFISSIONAIS.length!==1?"is":""}`;
}

function startProgress() {
  clearInterval(progressTimer);
  progress = 0;
  document.getElementById("progressFill").style.width = "0%";
  progressTimer = setInterval(() => {
    progress += 100 / (INTERVAL_MS / 100);
    if (progress > 100) progress = 100;
    document.getElementById("progressFill").style.width = progress + "%";
  }, 100);
}

function init() {
  renderPage(0);
  new QRCode(document.getElementById("qr"), {
    text: "mailto:{{ academia.email_qr }}",
    width: 110, height: 110,
    colorDark: "{{ academia.cor_primaria }}",
    colorLight: "#ffffff"
  });
  if (totalPages > 1) {
    startProgress();
    setInterval(() => {
      currentPage = (currentPage + 1) % totalPages;
      renderPage(currentPage);
      startProgress();
    }, INTERVAL_MS);
  }
}

init();
</script>
</body>
</html>
