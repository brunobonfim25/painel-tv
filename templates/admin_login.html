<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin — {{ academia.nome }}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:Arial,sans-serif;
    background:#f0f0f0;
    display:flex;align-items:center;justify-content:center;min-height:100vh;
  }
  .box{
    background:#fff;border-radius:12px;padding:40px 36px;
    width:100%;max-width:380px;border:1px solid #e0e0e0;
  }
  .logo{
    width:60px;height:60px;border-radius:50%;
    background:#1a1a2e;display:flex;align-items:center;
    justify-content:center;margin:0 auto 16px;overflow:hidden;
  }
  .logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .logo span{color:#fff;font-weight:900;font-size:20px;font-style:italic}
  h2{text-align:center;font-size:18px;color:#111;margin-bottom:6px}
  .sub{text-align:center;font-size:13px;color:#888;margin-bottom:24px}
  label{font-size:12px;color:#555;display:block;margin-bottom:4px;font-weight:600}
  input[type=password]{
    width:100%;padding:10px 12px;border:1px solid #ddd;
    border-radius:6px;font-size:14px;margin-bottom:16px;
  }
  button{
    width:100%;padding:11px;
    background:#1a1a2e;color:#fff;
    border:none;border-radius:6px;font-size:14px;
    font-weight:700;cursor:pointer;
  }
  button:hover{background:#2a2a4e}
  .erro{
    background:#fff0f0;border:1px solid #f5c6c6;
    border-radius:6px;padding:10px 12px;
    font-size:13px;color:#c0392b;margin-bottom:16px;
  }
  .tv-link{
    text-align:center;margin-top:16px;
    font-size:12px;color:#aaa;
  }
  .tv-link a{color:#1a6fd4;text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    {% if academia.logo_url %}
      <img src="{{ academia.logo_url }}" alt="Logo">
    {% else %}
      <span>{{ academia.logo_texto or academia.nome[:2] }}</span>
    {% endif %}
  </div>
  <h2>{{ academia.nome }}</h2>
  <div class="sub">Painel administrativo</div>

  {% with msgs = get_flashed_messages() %}
    {% if msgs %}
      {% for m in msgs %}
        <div class="erro">{{ m }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST">
    <label>Senha</label>
    <input type="password" name="senha" placeholder="Digite sua senha" autofocus required>
    <button type="submit">Entrar</button>
  </form>

  <div class="tv-link">
    <a href="{{ url_for('painel', slug=academia.slug) }}">Ver painel da TV</a>
  </div>
</div>
</body>
</html>
