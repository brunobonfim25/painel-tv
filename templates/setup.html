<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Academia — Painel TV</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #070d14; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #0e1a28; padding: 40px; border-radius: 12px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        h2 { margin-bottom: 24px; color: #3b82f6; font-size: 22px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 14px; margin-bottom: 18px; background: #070d14; border: 1px solid #22344a; border-radius: 6px; color: #fff; font-size: 14px; }
        input:focus { outline: none; border-color: #3b82f6; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
        .msg { background: #14283c; border-left: 3px solid #3b82f6; padding: 10px 14px; border-radius: 4px; margin-bottom: 18px; font-size: 13px; color: #eee; }
        .back { display: block; text-align: center; margin-top: 16px; color: #666; font-size: 13px; text-decoration: none; }
        .back:hover { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Criar Nova Academia</h2>
        {% with messages = get_flashed_messages() %}
            {% for msg in messages %}
                <div class="msg">{{ msg }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <label>Slug (URL)</label>
            <input name="slug" placeholder="ex: bt" required>
            <label>Nome da Academia</label>
            <input name="nome" placeholder="ex: BT Academia" required>
            <label>Senha do Admin</label>
            <input type="password" name="senha" required>
            <button type="submit">Criar Academia</button>
        </form>
        <a class="back" href="/master/dashboard">← Voltar ao dashboard</a>
    </div>
</body>
</html>
